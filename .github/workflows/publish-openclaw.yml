name: Publish OpenClaw plugin to GitHub Packages

# Triggers on tags shaped like `plugins/openclaw/v0.1.0`. Keeps the plugin's
# release cadence independent of the granola Python CLI's own versioning —
# Python releases tag as `vX.Y.Z`; plugin releases use a path-prefixed tag so
# the workflow only fires for the right artefact.

on:
  push:
    tags:
      - 'plugins/openclaw/v*'
  workflow_dispatch:
    inputs:
      ref:
        description: 'Ref to publish from (defaults to the workflow ref)'
        required: false
        type: string

permissions:
  contents: read
  packages: write

jobs:
  publish:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: plugins/openclaw
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ inputs.ref || github.ref }}

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          # Configures npm to publish + read from GitHub Packages for the
          # @alavida-ai scope. Writes the auth token line into ~/.npmrc using
          # NODE_AUTH_TOKEN (set per step below).
          registry-url: 'https://npm.pkg.github.com'
          scope: '@alavida-ai'

      - name: Install deps
        run: npm ci

      - name: Typecheck
        run: npm run typecheck

      - name: Build
        run: npm run build

      - name: Verify package.json version matches the tag
        if: startsWith(github.ref, 'refs/tags/plugins/openclaw/v')
        run: |
          tag_version="${GITHUB_REF_NAME#plugins/openclaw/v}"
          pkg_version="$(node -p "require('./package.json').version")"
          if [ "$tag_version" != "$pkg_version" ]; then
            echo "::error::tag version ($tag_version) does not match package.json version ($pkg_version)"
            exit 1
          fi
          echo "✓ tag $tag_version matches package.json $pkg_version"

      - name: Publish to GitHub Packages
        run: npm publish
        env:
          # GITHUB_TOKEN is auto-provided by Actions. With `packages: write`
          # above, it can publish under the org that owns this repo (alavida-ai).
          # No org-level secret or PAT needed for the publish step itself.
          NODE_AUTH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
