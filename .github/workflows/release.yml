name: Release

# Changesets-driven release flow:
#   1. PR merges to main with a .changeset/*.md file.
#   2. This workflow sees pending changesets and opens a "Version Packages" PR
#      that bumps versions and rewrites CHANGELOG.md for each package.
#   3. When that PR is merged, this workflow runs again and publishes every
#      package whose version was just bumped.
#
# Replaces the old per-package path-tag publish flow.

on:
  push:
    branches: [main]

concurrency: ${{ github.workflow }}-${{ github.ref }}

permissions:
  contents: write
  packages: write
  pull-requests: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: pnpm/action-setup@v6

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: 'pnpm'
          registry-url: 'https://npm.pkg.github.com'
          scope: '@alavida-ai'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build all packages
        run: pnpm build

      - name: Create release PR or publish
        uses: changesets/action@v1
        with:
          publish: pnpm changeset publish
          version: pnpm changeset version
        env:
          # GITHUB_TOKEN is auto-provided by Actions. With `packages: write`
          # above it can publish under the org that owns this repo.
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          NODE_AUTH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
